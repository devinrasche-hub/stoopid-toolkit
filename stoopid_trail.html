<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE STOOPID TRAIL</title>
<style>
:root{
  --teal:#00FFC6;
  --white:#FFFFFF;
  --purple:#8A2BE2;
  --red:#FF2D2D;
  --orange:#CC5500;
  --black:#000000;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--black);height:100%;}
body{
  color:var(--teal);
  font-family:"Share Tech Mono","Courier New",Courier,monospace;
  font-size:clamp(13px,1.7vw,17px);
  line-height:1.5;
  text-shadow:0 0 4px rgba(0,255,198,.5);
  overflow:hidden;
}
#wrap{
  position:relative;
  max-width:920px;
  height:100vh;
  margin:0 auto;
  padding:26px 20px;
  display:flex;
  flex-direction:column;
}
/* corner brackets */
.bk{position:absolute;width:26px;height:26px;border:0 solid var(--teal);pointer-events:none;z-index:5;}
.bk.tl{top:8px;left:8px;border-top-width:2px;border-left-width:2px;}
.bk.tr{top:8px;right:8px;border-top-width:2px;border-right-width:2px;}
.bk.bl{bottom:8px;left:8px;border-bottom-width:2px;border-left-width:2px;}
.bk.br{bottom:8px;right:8px;border-bottom-width:2px;border-right-width:2px;}
/* CRT scanlines + vignette */
#crt{
  position:fixed;inset:0;pointer-events:none;z-index:50;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.22) 0px,rgba(0,0,0,.22) 1px,transparent 1px,transparent 3px);
}
#crt::after{
  content:"";position:absolute;inset:0;
  box-shadow:inset 0 0 140px rgba(0,0,0,.85);
}
#screen{flex:1;overflow-y:auto;overflow-x:hidden;padding:6px 4px;scrollbar-width:thin;scrollbar-color:var(--teal) var(--black);}
#screen::-webkit-scrollbar{width:6px;}
#screen::-webkit-scrollbar-thumb{background:var(--teal);}
.w{color:var(--white);text-shadow:0 0 4px rgba(255,255,255,.5);}
.p{color:var(--purple);text-shadow:0 0 5px rgba(138,43,226,.6);}
.r{color:var(--red);text-shadow:0 0 5px rgba(255,45,45,.6);}
.o{color:var(--orange);text-shadow:0 0 8px rgba(204,85,0,.8);}
.dim{opacity:.62;}
.c{text-align:center;}
.big{font-size:2.1em;letter-spacing:.08em;line-height:1.15;}
.med{font-size:1.35em;letter-spacing:.06em;}
.gap{height:1.2em;}
.gap2{height:2.4em;}
pre{font-family:inherit;line-height:1.25;white-space:pre;overflow-x:auto;}
.menu{margin-top:1em;}
.mi{display:block;width:100%;text-align:left;background:none;border:none;color:var(--teal);
  font:inherit;text-shadow:inherit;cursor:pointer;padding:3px 8px;}
.mi:hover,.mi.sel{background:var(--teal);color:var(--black);text-shadow:none;}
.mi .k{color:var(--white);text-shadow:0 0 4px rgba(255,255,255,.5);}
.mi:hover .k,.mi.sel .k{color:var(--black);text-shadow:none;}
input[type=text]{
  background:var(--black);border:none;border-bottom:2px solid var(--teal);
  color:var(--white);font:inherit;font-size:1.1em;text-shadow:inherit;
  padding:2px 6px;outline:none;width:min(420px,86%);letter-spacing:.05em;
}
.statbar{
  border-top:1px solid var(--teal);border-bottom:1px solid var(--teal);
  padding:4px 0;margin:8px 0;display:flex;flex-wrap:wrap;gap:2px 18px;font-size:.92em;
}
.statbar span b{color:var(--white);font-weight:normal;text-shadow:0 0 4px rgba(255,255,255,.4);}
canvas{display:block;margin:6px auto;image-rendering:pixelated;background:var(--black);}
.rule{border:none;border-top:1px dashed rgba(0,255,198,.4);margin:10px 0;}
.deathscreen{color:var(--red);text-shadow:0 0 6px rgba(255,45,45,.6);}
.blink{animation:bl 1.1s steps(1) infinite;}
@keyframes bl{50%{opacity:0;}}
table.store{width:100%;border-collapse:collapse;margin:8px 0;}
table.store td{padding:2px 6px;}
table.store td.n{color:var(--white);text-shadow:0 0 4px rgba(255,255,255,.4);}
@media (max-width:600px){
  #wrap{padding:18px 10px;}
  .big{font-size:1.5em;}
}
</style>
</head>

<div id="crt"></div>
<div id="wrap">
  <div class="bk tl"></div><div class="bk tr"></div><div class="bk bl"></div><div class="bk br"></div>

</div>

/* ================= RNG ================= */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
let SEED = 0;
(function(){
  const m = location.search.match(/[?&]seed=([0-9A-Fa-f]{1,4})/);
  SEED = m ? parseInt(m[1],16) : (Math.random()*65536)|0;
})();
let rnd = mulberry32(SEED);
function ri(a,b){return a+Math.floor(rnd()*(b-a+1));}   // int in [a,b]
function pick(arr){return arr[Math.floor(rnd()*arr.length)];}
function chance(p){return rnd()<p;}
const seedStr = ()=>SEED.toString(16).toUpperCase().padStart(4,"0");

/* ================= GEO ================= */
function haversine(a,b){
  const R=3958.8, d=Math.PI/180;
  const dLa=(b.la-a.la)*d, dLo=(b.lo-a.lo)*d;
  const h=Math.sin(dLa/2)**2+Math.cos(a.la*d)*Math.cos(b.la*d)*Math.sin(dLo/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}
// interpolate along great circle (good enough at these distances)
function gcPoint(a,b,f){
  const d=Math.PI/180, la1=a.la*d, lo1=a.lo*d, la2=b.la*d, lo2=b.lo*d;
  const dd=2*Math.asin(Math.sqrt(Math.sin((la2-la1)/2)**2+Math.cos(la1)*Math.cos(la2)*Math.sin((lo2-lo1)/2)**2));
  if(dd<1e-9) return {la:a.la, lo:a.lo};
  const A=Math.sin((1-f)*dd)/Math.sin(dd), B=Math.sin(f*dd)/Math.sin(dd);
  const x=A*Math.cos(la1)*Math.cos(lo1)+B*Math.cos(la2)*Math.cos(lo2);
  const y=A*Math.cos(la1)*Math.sin(lo1)+B*Math.cos(la2)*Math.sin(lo2);
  const z=A*Math.sin(la1)+B*Math.sin(la2);
  return {la:Math.atan2(z,Math.hypot(x,y))/d, lo:Math.atan2(y,x)/d};
}
function nearestCity(pt,excl){
  let best=null,bd=1e18;
  for(const c of CITIES){
    if(excl.has(c)) continue;
    const dx=(c.la-pt.la), dy=(c.lo-pt.lo)*Math.cos(pt.la*Math.PI/180);
    const dd=dx*dx+dy*dy;
    if(dd<bd){bd=dd;best=c;}
  }
  return best;
}

/* ================= AUDIO ================= */
const SND = {
  on:true, ready:false, ctx:null, gain:null, src:null, fallback:null, started:false,
  init(){
    if(this.ready||this.failed) return;
    try{
      this.ctx = new (window.AudioContext||window.webkitAudioContext)();
      this.gain = this.ctx.createGain();
      this.gain.connect(this.ctx.destination);
      this.ready = true;
      fetch("kwtf_trail_loop.mp3").then(r=>{
        if(!r.ok) throw 0;
        return r.arrayBuffer();
      }).then(b=>this.ctx.decodeAudioData(b)).then(buf=>{
        this.buf = buf;
        if(this.on && this.started) this.play();
      }).catch(()=>{ this.useFallback(); });
    }catch(e){ this.failed=true; this.useFallback(); }
  },
  useFallback(){
    // file:// or fetch blocked: plain looping <audio>
    if(this.fallback) return;
    this.fallback = new Audio("kwtf_trail_loop.mp3");
    this.fallback.loop = true;
    if(this.on && this.started) this.fallback.play().catch(()=>{});
  },
  start(){ // first user gesture
    if(this.started) return;
    this.started = true;
    this.init();
    if(this.on) this.play();
  },
  play(){
    if(!this.on) return;
    if(this.buf && this.ctx){
      if(this.src) return;
      const s=this.ctx.createBufferSource();
      s.buffer=this.buf; s.loop=true; s.connect(this.gain);
      this.gain.gain.setValueAtTime(0.85,this.ctx.currentTime);
      s.start(); this.src=s;
      if(this.ctx.state==="suspended") this.ctx.resume();
    }else if(this.fallback){
      this.fallback.play().catch(()=>{});
    }
  },
  stop(){
    if(this.src){ try{this.src.stop();}catch(e){} this.src=null; }
    if(this.fallback) this.fallback.pause();
  },
  toggle(){
    this.on=!this.on;
    this.start();
    this.static_();
    if(this.on) this.play(); else this.stop();
    const el=document.getElementById("sndstate");
    if(el) el.textContent = this.on?"ON":"OFF";
  },
  static_(){ // KWTF radio tuning burst
    if(!this.ctx) return;
    try{
      const len=this.ctx.sampleRate*0.22;
      const b=this.ctx.createBuffer(1,len,this.ctx.sampleRate);
      const d=b.getChannelData(0);
      for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len)*0.5;
      const s=this.ctx.createBufferSource(); s.buffer=b;
      const f=this.ctx.createBiquadFilter(); f.type="bandpass"; f.frequency.value=1800; f.Q.value=0.7;
      const g=this.ctx.createGain(); g.gain.value=0.35;
      s.connect(f); f.connect(g); g.connect(this.ctx.destination);
      s.start();
    }catch(e){}
  },
  duck(){ // the wagon radio has the decency to go quiet
    if(this.gain&&this.ctx) this.gain.gain.linearRampToValueAtTime(0.0,this.ctx.currentTime+0.6);
    if(this.fallback) this.fallback.volume=0;
  },
  unduck(){
    if(this.gain&&this.ctx) this.gain.gain.linearRampToValueAtTime(0.85,this.ctx.currentTime+1.2);
    if(this.fallback) this.fallback.volume=1;
  }
};

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function show(html){
  SCR.innerHTML = html;
  SCR.scrollTop = 0;

}
function menu(opts, onpick){
  // opts: [{k:"1", t:"TRAVEL THE TRAIL", fn}...]
  menuItems = opts;
  const div=document.createElement("div");
  div.className="menu";
  opts.forEach(o=>{
    const b=document.createElement("button");
    b.className="mi";
    b.innerHTML='<span class="k">['+o.k+']</span> '+o.t;
    b.onclick=(e)=>{e.stopPropagation(); SND.start(); o.fn();};
    div.appendChild(b);
    o._el=b;
  });
  SCR.appendChild(div);
  keyHandler = (e)=>{
    const o = opts.find(x=>x.k.toLowerCase()===e.key.toLowerCase());
    if(o){ o.fn(); return true; }
    return false;
  };
}
function anyKey(fn,label){
  const p=document.createElement("div");
  p.className="c dim";
  p.style.marginTop="1.4em";
  p.innerHTML='<span class="blink">'+(label||"PRESS ENTER TO CONTINUE")+"</span>";
  SCR.appendChild(p);
  setTimeout(()=>{ SCR.onclick=()=>{SND.start(); SCR.onclick=null; fn();}; },80);
  keyHandler=(e)=>{ if(e.key==="s"||e.key==="S") return false; SCR.onclick=null; fn(); return true; };
}
function askText(prompt, fn, maxlen, prefill){
  const d=document.createElement("div");
  d.style.marginTop="1em";
  d.innerHTML=esc(prompt)+"<br><br>";
  const inp=document.createElement("input");
  inp.type="text"; inp.maxLength=maxlen||24; inp.autocomplete="off";
  inp.spellcheck=false;
  if(prefill) inp.value=prefill;
  d.appendChild(inp);
  SCR.appendChild(d);
  inp.focus();
  keyHandler=null; // input handles its own keys
  inp.addEventListener("keydown",e=>{
    e.stopPropagation();
    SND.start();
    if(e.key==="Enter"){ fn(inp.value.trim()); }
  });
  setTimeout(()=>inp.focus(),30);
  return inp;
}
document.addEventListener("keydown",e=>{
  if(e.target && e.target.tagName==="INPUT") return;
  SND.start();
  if(e.key==="s"||e.key==="S"){
    if(!(keyHandler&&menuItems.some(m=>m.k.toLowerCase()==="s"))){ SND.toggle(); return; }
  }
  if(keyHandler) keyHandler(e);
});

/* ---- city fuzzy matching ---- */
function norm(s){return s.toLowerCase().replace(/[^a-z0-9 ,]/g,"").replace(/\s+/g," ").trim();}
function matchCity(input){
  const q=norm(input);
  if(!q) return null;
  // allow "city, st" / "city st"
  let qc=q, qst=null;
  const m=q.match(/^(.+?)[, ]+([a-z]{2})$/);
  if(m && CITIES.some(c=>c.st.toLowerCase()===m[2])){ qc=m[1].trim(); qst=m[2]; }
  const pool = qst? CITIES.filter(c=>c.st.toLowerCase()===qst) : CITIES;
  const nn = c=>norm(c.n);
  let hit = pool.find(c=>nn(c)===qc);
  if(!hit) hit = pool.find(c=>nn(c).startsWith(qc));
  if(!hit) hit = pool.find(c=>nn(c).includes(qc));
  if(!hit && qc.length>=4){ // forgiving: allow one typo-ish prefix match
    hit = pool.find(c=>{
      const a=nn(c).slice(0,qc.length);
      if(Math.abs(a.length-qc.length)>1) return false;
      let diff=0;
      for(let i=0;i<Math.min(a.length,qc.length);i++) if(a[i]!==qc[i]) diff++;
      return diff<=1;
    });
  }
  return hit||null;
}
function cityScreen(msg){
  show('<div class="gap"></div><div class="med w">WHERE DOES YOUR JOURNEY BEGIN?</div>'+

function riverNameFor(pt,used){
  let pool=RIVERS_REAL.filter(r=>!used.has(r.n) &&
    pt.lo>=r.lo[0]-1 && pt.lo<=r.lo[1]+1 && pt.la>=r.la[0]-1 && pt.la<=r.la[1]+1);
  if(!pool.length) pool=RIVERS_REAL.filter(r=>!used.has(r.n) && pt.lo>=r.lo[0]-4 && pt.lo<=r.lo[1]+4);
  const nm=pool.length?pick(pool).n:"AN UNNAMED RIVER";
  used.add(nm); return nm;
}
function buildRoute(startCity){
  G.start=startCity;
  const dist=Math.max(40,Math.round(haversine(startCity,DAV)*1.2));
  G.route=dist;
  const L=Math.max(8,Math.min(14,Math.round(dist/170)));
  const nRivers=Math.max(2,Math.min(4, 2+(dist>1400?1:0)+(dist>2400?1:0)));
  // pick which landmark slots are rivers (spread out, none first)
  const riverSlots=new Set();
  while(riverSlots.size<nRivers-1){ riverSlots.add(ri(1,L-2)); }
  // final crossing: the Mississippi if we approach from west or south
  const fromWestOrSouth = startCity.lo < DAV.lo-0.4 || startCity.la < DAV.la-1.2;
  if(fromWestOrSouth) riverSlots.add(L-1); else riverSlots.add(ri(1,L-2));
  const excl=new Set([startCity]);
  const dav=CITIES.find(c=>c.n==="Davenport"&&c.st==="IA");
  if(dav) excl.add(dav);
  const usedRivers=new Set();
  let townToggle=0;
  G.landmarks=[];
  for(let i=1;i<=L;i++){
    const f=i/(L+1);
    const pt=gcPoint(startCity,DAV,f);
    const c=nearestCity(pt,excl); excl.add(c);
    const at=Math.round(dist*f*(0.97+rnd()*0.06));
    const slot=i-1;
    if(riverSlots.has(slot)){
      const isMiss = fromWestOrSouth && slot===L-1;
      const nm = isMiss? "THE MISSISSIPPI RIVER" : riverNameFor(c,usedRivers);
      const big = isMiss;
      G.landmarks.push({type:"river", name:nm, miles:at,
        depth: big? ri(9,22) : ri(2,14), width: big? ri(1200,2400) : ri(150,900)});
    }else if(townToggle++%2===0){
      G.landmarks.push({type:"town", name:c.n.toUpperCase()+", "+c.st, miles:at, city:c});
    }else{
      G.landmarks.push({type:"fort", name:"FORT "+c.n.toUpperCase().split(" ")[0], miles:at, city:c});
    }
  }
  G.landmarks.sort((a,b)=>a.miles-b.miles);
  // enforce mississippi last if present
  const mi=G.landmarks.findIndex(l=>l.name==="THE MISSISSIPPI RIVER");
  if(mi>=0){ const [ms]=G.landmarks.splice(mi,1); ms.miles=Math.round(dist*0.96); G.landmarks.push(ms); }
}
const VOID_TOWNS=["THE GRAY EXPANSE","MILE MARKER NOTHING","A TOWN THAT ISN'T","THE LONG QUIET","STATIC FIELDS","THE HUM","LOWER ABSENCE","PALE JUNCTION","THE UNPLACE","SETTLEMENT 404","THE FORMER SOMEWHERE"];
const VOID_FORTS=["FORT DOUBT","FORT NOTHING","FORT PROBABLY","FORT SIGNAL","FORT STATIC"];
const VOID_RIVERS=["THE RIVER UNNAMED","THE SLOW DARK","THE MURMUR","A RIVER OF SOME KIND"];
function buildVoidRoute(){
  G.isVoid=true;
  G.start={n:"The Void",st:"??",la:41.5,lo:-120.6}; // west of everything
  G.route=2000;
  const L=12, towns=[...VOID_TOWNS], forts=[...VOID_FORTS], rivers=[...VOID_RIVERS];
  const riverSlots=new Set([3,7]);
  G.landmarks=[];
  let toggle=0;
  for(let i=1;i<=L;i++){
    const at=Math.round(2000*(i/(L+1))*(0.97+rnd()*0.06));
    const slot=i-1;
    if(slot===L-1){
      G.landmarks.push({type:"river",name:"THE MISSISSIPPI RIVER",miles:1920,depth:ri(9,22),width:ri(1200,2400)});
    }else if(riverSlots.has(slot)){
      G.landmarks.push({type:"river",name:rivers.splice(ri(0,rivers.length-1),1)[0],miles:at,depth:ri(2,14),width:ri(150,900)});
    }else if(toggle++%2===0){
      G.landmarks.push({type:"town",name:towns.splice(ri(0,towns.length-1),1)[0],miles:at,voidTown:true});
    }else{
      G.landmarks.push({type:"fort",name:forts.splice(ri(0,forts.length-1),1)[0],miles:at,voidTown:true});
    }
  }
  G.landmarks.sort((a,b)=>a.miles-b.miles);
}

  return 1 + 0.9*(G.miles/G.route);

/* ============ TRAVEL CORE ============ */
const PACES=[{n:"STEADY",f:1.0,h:0},{n:"STRENUOUS",f:1.35,h:-1},{n:"GRUELING",f:1.65,h:-2.5}];
const RATIONS=[{n:"FILLING",lbs:3,h:1},{n:"MEAGER",lbs:2,h:-0.5},{n:"BARE BONES",lbs:1,h:-2}];
function aliveCount(){return G.party.filter(p=>p.alive).length;}
function healthWord(){
  return G.health>75?"GOOD":G.health>50?"FAIR":G.health>25?"POOR":"VERY POOR";
}
function advanceDate(){
  G.day++;
  if(G.day>MLEN[G.month]){G.day=1;G.month=(G.month+1)%12;}
}
function currentPos(){ // interpolated position for weather purposes
  const f=Math.min(1,G.miles/G.route);
  return gcPoint(G.start,DAV,f);
}
function rollWeather(){
  const pos=currentPos();
  const m=G.month;
  const winterish = (m<=1||m>=10);
  const summerish = (m>=5&&m<=8);
  const cold = winterish || pos.la>44 && (m<=2||m>=9);
  let w="CLEAR";
  const r=rnd();
  if(cold){
    if(r<0.12) w="BLIZZARD";
    else if(r<0.32) w="SNOW";
    else if(r<0.5) w="COLD RAIN";
    else if(r<0.62) w="BITTER COLD";
  }else if(summerish){
    if(r<0.08) w="THUNDERSTORM";
    else if(r<0.2) w="RAIN";
    else if(r<0.34) w="VERY HOT";
  }else{
    if(r<0.15) w="RAIN";
    else if(r<0.2) w="THUNDERSTORM";
    else if(r<0.26) w="COLD";
  }
  G.weather=w;
}
function milesPerDay(){
  if(G.oxen<1) return 0;
  let mpd=(13+2.6*Math.min(G.oxen,4))*PACES[G.pace].f;
  if(G.weather==="RAIN"||G.weather==="COLD RAIN") mpd*=0.7;
  if(G.weather==="SNOW") mpd*=0.5;
  if(G.weather==="THUNDERSTORM") mpd*=0.6;
  if(G.weather==="BLIZZARD") mpd=0;
  if(G.health<=50) mpd*=0.85;
  if(G.health<=25) mpd*=0.7;
  if(G.grassless>0) mpd*=0.75;
  return Math.round(mpd);
}
function dailyHealth(){
  let d=PACES[G.pace].h + RATIONS[G.rations].h;
  if(G.food<=0) d-=6;
  if(G.weather==="BLIZZARD"||G.weather==="BITTER COLD"){
    d -= (G.clothing>=aliveCount()) ? 1.5 : 4;
  }
  if(G.weather==="VERY HOT") d-=0.5;
  if(G.weather==="CLEAR") d+=0.5;
  const sickCount=G.party.filter(p=>p.alive&&p.disease).length;
  d -= sickCount*1.5;
  G.health=Math.max(0,Math.min(100,G.health+d));
}
function consumeFood(){
  const need=aliveCount()*RATIONS[G.rations].lbs;
  G.food=Math.max(0,G.food-need);
}

/* ---- diseases & death ---- */
const DISEASES=["DYSENTERY","CHOLERA","TYPHOID","MEASLES","EXHAUSTION"];
function infect(who,dis){
  if(!who||who.disease) return false;
  who.disease=dis; who.sickDays=0;
  return true;
}
function randomHealthy(){
  const c=G.party.filter(p=>p.alive&&!p.disease);
  return c.length?pick(c):null;
}
function tickSickness(deaths){
  for(const p of G.party){
    if(!p.alive||!p.disease) continue;
    p.sickDays++;
    const dur=ri(4,10);
    if(p.sickDays>=4){
      // resolve: die or recover. worse aggregate health = worse odds
      const dieP=0.03+(100-G.health)*0.0035+(G.rations===2?0.04:0)+(G.pace===2?0.03:0);
      if(chance(dieP)){ p.alive=false; deaths.push({p,cause:p.disease}); }
      else if(p.sickDays>=dur){ p.disease=null; p.sickDays=0; }
    }
  }
}

/* ---- random events ---- */
function eventPool(){
  const E=[];
  const W=(w,fn)=>E.push({w,fn});
  const sickMod = (100-G.health)/100; // 0..1
  W(5+8*sickMod,()=>{ const p=randomHealthy(); if(!p)return null;
    const dis=pick(["DYSENTERY","DYSENTERY","CHOLERA","TYPHOID","MEASLES"]);
    infect(p,dis); return {msg:p.name+" HAS "+dis+".", bad:true}; });
  W(G.pace===2?5:1.5,()=>{ const p=randomHealthy(); if(!p)return null;
    infect(p,"EXHAUSTION"); return {msg:p.name+" HAS EXHAUSTION.", bad:true}; });
  W(2,()=>{ const p=randomHealthy(); if(!p)return null;
    if(chance(0.5)){ infect(p,"SNAKEBITE"); G.health-=8;
      return {msg:p.name+" WAS BITTEN BY A SNAKE.", bad:true}; }
    return {msg:p.name+" WAS BITTEN BY A SNAKE. IT WAS FINE. THE SNAKE FELT NOTHING EITHER."}; });
  W(4,()=>{ if(chance(0.6)&&G.parts.wheel>0){G.parts.wheel--;
      return {msg:"A WAGON WHEEL BROKE. YOU HAVE A SPARE. THE SPARE IS NOW NOT A SPARE.", days:1};}
    if(G.parts.wheel>0){G.parts.wheel--; return {msg:"A WAGON WHEEL BROKE. REPLACED.", days:1};}
    return {msg:"A WAGON WHEEL BROKE. NO SPARE. YOU LOSE "+(3)+" DAYS IMPROVISING.", days:3, bad:true}; });
  W(3,()=>{ if(G.parts.axle>0){G.parts.axle--; return {msg:"THE WAGON AXLE SNAPPED. REPLACED.", days:1};}
    return {msg:"THE WAGON AXLE SNAPPED. NO SPARE. 4 DAYS OF CARPENTRY BY COMMITTEE.", days:4, bad:true}; });
  W(2,()=>{ if(G.parts.tongue>0){G.parts.tongue--; return {msg:"THE WAGON TONGUE BROKE. REPLACED.", days:1};}
    return {msg:"THE WAGON TONGUE BROKE. NO SPARE. 3 DAYS. THE OXEN WATCHED.", days:3, bad:true}; });
  W(3,()=>{ if(G.oxen<1)return null;
    if(chance(0.5)){ return {msg:"AN OX WANDERED OFF. YOU LOSE A DAY FINDING IT. IT WAS NOT HIDING.", days:1}; }
    G.oxen=Math.max(0,G.oxen-1); return {msg:"AN OX WANDERED OFF AND DID NOT COME BACK. IT HAD ITS REASONS.", bad:true}; });
  W(2,()=>{ if(G.oxen<1)return null; G.oxen=Math.max(0,G.oxen-1);
    return {msg:"AN OX HAS DIED. THE OTHERS SAY NOTHING.", bad:true}; });
  W(3,()=>{ const what=ri(0,2);
    if(what===0&&G.clothing>0){const q=ri(1,Math.min(3,G.clothing));G.clothing-=q;
      return {msg:"A THIEF CAME IN THE NIGHT AND TOOK "+q+" SET"+(q>1?"S":"")+" OF CLOTHING.", bad:true};}
    if(what===1&&G.bullets>0){const q=ri(20,Math.min(80,G.bullets));G.bullets-=q;
      return {msg:"A THIEF TOOK "+q+" BULLETS. QUIETLY. WHICH IS THE ONLY WAY TO TAKE BULLETS.", bad:true};}
    if(G.food>0){const q=ri(10,Math.min(60,Math.max(10,G.food)));G.food=Math.max(0,G.food-q);
      return {msg:"A THIEF TOOK "+q+" POUNDS OF FOOD.", bad:true};}
    return {msg:"A THIEF CAME AND FOUND NOTHING WORTH TAKING. SOMEHOW THIS IS WORSE."}; });
  W(4,()=>{ if(chance(0.5)){ const p=randomHealthy();
      if(p&&chance(0.6)){ infect(p,pick(["DYSENTERY","CHOLERA"])); return {msg:"BAD WATER. "+p.name+" DRANK IT ANYWAY.", bad:true}; } }
    return {msg:"BAD WATER. YOU LOSE A DAY LOOKING FOR BETTER WATER. IT WAS ADEQUATE.", days:1}; });
  W(3,()=>{ G.grassless=ri(2,4);
    return {msg:"NO GRASS FOR THE OXEN. THEY SLOW DOWN. THEY DO NOT COMPLAIN. THAT'S THE WORST PART.", bad:true}; });
  W(3,()=>{ return {msg:"YOU TOOK THE WRONG TRAIL AND LOST "+2+" DAYS. THE RIGHT TRAIL LOOKED WRONGER.", days:2, bad:true}; });
  W(3,()=>{ const q=ri(15,35); G.food+=q;
    return {msg:"YOU FOUND WILD FRUIT. "+q+" POUNDS. THE TRAIL PROVIDES, OCCASIONALLY."}; });
  W(2,()=>{ const part=pick(["wheel","axle","tongue"]); G.parts[part]++;
    return {msg:"AN ABANDONED WAGON. YOU TAKE A SPARE "+part.toUpperCase()+". YOU DO NOT ASK WHAT HAPPENED HERE."}; });
  W(2,()=>{ if(G.weather!=="BLIZZARD"&&G.weather!=="THUNDERSTORM")return null;
    const q=ri(5,25); G.food=Math.max(0,G.food-q);
    return {msg:"SEVERE WEATHER TORE AT THE WAGON. LOST "+q+" POUNDS OF FOOD.", bad:true, days:1}; });
  W(2,()=>{ const alive=G.party.filter(p=>p.alive); if(alive.length<2)return null;
    const p=pick(alive.filter((_,i)=>i>0)||alive);
    return {msg:p.name+" WANDERED OFF. YOU LOSE 2 DAYS SEARCHING. FOUND SITTING ON A ROCK. NO EXPLANATION OFFERED.", days:2}; });
  W(1,()=>{ return {msg:"NOTHING HAPPENED TODAY. OUT HERE, THAT'S AN EVENT."}; });
  return E;
}
function rollEvent(){
  if(!chance(0.28)) return null;
  const pool=eventPool();
  const total=pool.reduce((s,e)=>s+e.w,0);
  let r=rnd()*total;
  for(const e of pool){ r-=e.w; if(r<=0){ const res=e.fn(); return res||null; } }
  return null;
}

/* pixel wagon on canvas */
function drawTrail(cv,moving){
  const cx=cv.getContext("2d");
  let off=0;
  const teal="#00FFC6", white="#FFFFFF";
  function frame(){
    cx.fillStyle="#000"; cx.fillRect(0,0,cv.width,cv.height);
    cx.fillStyle=teal;
    // ground
    for(let x=0;x<cv.width;x+=14){
      cx.fillRect(((x-off)%cv.width+cv.width)%cv.width,96,8,2);
    }
    // horizon scenery by progress
    const f=G?Math.min(1,G.miles/Math.max(1,G.route)):0;
    for(let i=0;i<5;i++){
      const sx=(((i*160-off*0.3)%cv.width)+cv.width)%cv.width;
      if(f<0.4){ // mountains west / generic hills
        cx.fillRect(sx,60,2,2);cx.fillRect(sx+2,56,2,6);cx.fillRect(sx+4,52,2,10);cx.fillRect(sx+6,56,2,6);cx.fillRect(sx+8,60,2,2);
      }else{ // plains: grass ticks
        cx.fillRect(sx,60,1,4);cx.fillRect(sx+6,62,1,2);
      }
    }
    // wagon (pixel blocks) at x=90
    const bob=moving? ((off>>3)%2) : 0;
    const wx=90, wy=64+bob;
    cx.fillStyle=teal;
    cx.fillRect(wx+6,wy-14,34,14);      // canvas top
    cx.fillRect(wx+2,wy,44,10);         // bed
    cx.fillStyle=white;
    cx.fillRect(wx+6,wy-12,34,2);       // canvas highlight
    cx.fillStyle=teal;
    // wheels
    const spin=(off>>2)%2;
    [[wx+10,wy+14],[wx+36,wy+14]].forEach(([x,y])=>{
      cx.beginPath();cx.arc(x,y,7,0,7);cx.strokeStyle=teal;cx.lineWidth=2;cx.stroke();
      cx.beginPath();
      if(spin){cx.moveTo(x-5,y);cx.lineTo(x+5,y);cx.moveTo(x,y-5);cx.lineTo(x,y+5);}
      else{cx.moveTo(x-4,y-4);cx.lineTo(x+4,y+4);cx.moveTo(x-4,y+4);cx.lineTo(x+4,y-4);}
      cx.stroke();
    });
    // oxen ahead
    if(G&&G.oxen>0){
      for(let o=0;o<Math.min(G.oxen,3);o++){
        const ox=wx+58+o*24;
        cx.fillRect(ox,wy+2,16,8);
        cx.fillRect(ox+12,wy-2,6,6); // head
        cx.fillRect(ox+2,wy+10+bob,2,4); cx.fillRect(ox+12,wy+10+(1-bob),2,4); // legs
      }
    }
    if(moving){ off+=2; anim=requestAnimationFrame(frame); }
  }
  frame();
}

/* ---- traveling day by day ---- */
function goTravel(){
  stopAnim();
  show('<div class="med w c" style="margin-top:6px">THE STOOPID TRAIL</div>'+statusBar());
  const cv=document.createElement("canvas");
  cv.width=640; cv.height=120; cv.style.width="min(640px,96%)";
  SCR.appendChild(cv);
  const note=document.createElement("div");
  note.className="c dim"; note.innerHTML='<span class="blink">TRAVELING — PRESS ENTER TO STOP</span>';
  SCR.appendChild(note);
  drawTrail(cv,true);
  let stopped=false;
  keyHandler=()=>{stopped=true;return true;};
  function dayStep(){
    if(stopped){ travelScreen(); return; }
    const deaths=[];
    advanceDate(); rollWeather();
    const mpd=milesPerDay();
    G.miles+=mpd;
    if(G.grassless>0)G.grassless--;
    consumeFood(); dailyHealth(); tickSickness(deaths);
    // starvation deaths
    if(G.food<=0 && chance(0.06)){
      const p=randomHealthy()||G.party.find(x=>x.alive);
      if(p){p.alive=false;deaths.push({p,cause:"STARVATION"});}
    }
    if(G.health<=0 && chance(0.25)){
      const p=G.party.find(x=>x.alive);
      if(p){p.alive=false;deaths.push({p,cause:p.disease||"THE TRAIL ITSELF"});}
    }
    // update status line
    const sb=SCR.querySelector(".statbar");
    if(sb)sb.outerHTML=statusBar();
    if(aliveCount()===0){ stopAnim(); gameOverScreen(deaths[deaths.length-1]); return; }
    if(deaths.length){ stopAnim(); deathScreen(deaths,()=>checkpointOrContinue()); return; }
    const ev=rollEvent();
    if(ev){
      stopAnim();
      if(ev.days){ for(let i=0;i<ev.days;i++){advanceDate();consumeFood();} }
      eventScreen(ev);
      return;
    }
    // landmark?
    const lm=G.landmarks[G.lmIdx];
    if(lm && G.miles>=lm.miles){ G.miles=lm.miles; stopAnim(); landmarkArrive(lm); return; }
    if(G.miles>=G.route){ stopAnim(); arrivalScreen(); return; }
    setTimeout(dayStep,420);
  }
  setTimeout(dayStep,420);
}
function checkpointOrContinue(){
  const lm=G.landmarks[G.lmIdx];
  if(lm && G.miles>=lm.miles){ landmarkArrive(lm); }
  else if(G.miles>=G.route){ arrivalScreen(); }
  else travelScreen();
}
function eventScreen(ev){
  show('<div class="gap2"></div>'+statusBar()+
    '<div class="gap"></div><div class="c '+(ev.bad?"":"")+'">'+ev.msg+'</div>');
  anyKey(()=>checkpointOrContinue());
}

  show('<div class="gap"></div><div class="c med w">'+esc(lm.name)+'</div>'+
    '<div class="c dim">'+MONTHS[G.month]+' '+G.day+'</div><hr class="rule">'+
    '<pre class="c">'+riverArt(lm)+'</pre>'+
    '<div class="c">THE RIVER IS '+lm.depth+' FEET DEEP AND '+lm.width+' FEET ACROSS.</div>'+
    '<div class="c dim">IT HAS BEEN HERE LONGER THAN YOUR PLANS.</div>');
  const ferryCost=lm.width>1000? 12: 8;
  menu([
    {k:"1",t:"FORD THE RIVER",fn:()=>fordRiver(lm)},
    {k:"2",t:"CAULK THE WAGON AND FLOAT IT ACROSS",fn:()=>caulkRiver(lm)},
    {k:"3",t:"TAKE THE FERRY ($"+ferryCost+")",fn:()=>ferryRiver(lm,ferryCost)},
    {k:"4",t:"WAIT A DAY AND SEE IF CONDITIONS IMPROVE",fn:()=>waitRiver(lm)}
  ]);
}
function riverArt(lm){
  const w=Math.min(46,Math.max(18,Math.round(lm.width/60)));
  let a="";
  for(let r=0;r<3;r++){
    a+=" ".repeat(3)+"~".repeat(w)+"\n";
  }
  return a;
}
function crossedOk(lm,msg){
  show('<div class="gap2"></div><div class="c">'+msg+'</div>'+
    '<div class="c dim">'+lm.name+' IS BEHIND YOU. IT DOES NOT WAVE.</div>');
  advanceDate();consumeFood();
  anyKey(checkpointOrContinue2);
}
function riverDisaster(lm,how){
  // supply loss, possible drowning
  const foodLoss=ri(20,Math.max(25,Math.round(G.food*0.4)));
  const bulletLoss=ri(0,Math.min(60,G.bullets));
  G.food=Math.max(0,G.food-foodLoss);
  G.bullets=Math.max(0,G.bullets-bulletLoss);
  const clothLoss=ri(0,Math.min(3,G.clothing));
  if(clothLoss)G.clothing-=clothLoss;
  const lost=[foodLoss+" LBS OF FOOD"];
  if(bulletLoss)lost.push(bulletLoss+" BULLETS");
  if(clothLoss)lost.push(clothLoss+" SET"+(clothLoss>1?"S":"")+" OF CLOTHING");
  let msg="THE WAGON "+how+".<br>LOST "+lost.join(", ")+".";
  const drownP = lm.depth>10?0.35: lm.depth>6?0.2: 0.1;
  advanceDate();consumeFood();
  if(chance(drownP)&&aliveCount()>0){
    const victim=pick(G.party.filter(p=>p.alive));
    victim.alive=false;
    if(aliveCount()===0){ gameOverScreen({p:victim,cause:"DROWNING"}); return; }
    deathScreen([{p:victim,cause:"DROWNING"}],()=>{
      show('<div class="gap2"></div><div class="c">'+msg+'</div>');
      anyKey(checkpointOrContinue2);
    });
    return;
  }
  show('<div class="gap2"></div><div class="c">'+msg+'</div>'+
    '<div class="c dim">THE RIVER KEEPS WHAT IT TAKES.</div>');
  anyKey(checkpointOrContinue2);
}
function fordRiver(lm){
  if(lm.depth<=3){
    if(chance(0.9)){ crossedOk(lm,"YOU WALK THE OXEN ACROSS. COLD, WET, UNEVENTFUL. THE GOOD KIND OF CROSSING."); }
    else riverDisaster(lm,"HIT A HOLE AND TIPPED");
  }else if(lm.depth<=6){
    if(chance(0.45)) crossedOk(lm,"SOMEHOW, THE WAGON MAKES IT. THE OXEN DO NOT ACKNOWLEDGE YOUR CHEERING.");
    else riverDisaster(lm,"SWAMPED IN THE CURRENT");
  }else{
    riverDisaster(lm,"WENT UNDER ALMOST IMMEDIATELY");
  }
}
function caulkRiver(lm){
  let p = lm.depth<=8? 0.75 : lm.depth<=14? 0.55 : 0.4;
  if(G.weather==="THUNDERSTORM"||G.weather==="RAIN"||G.weather==="COLD RAIN") p-=0.15;
  if(lm.width>1200) p-=0.1;
  if(chance(p)) crossedOk(lm,"THE WAGON FLOATS. PHYSICS ALLOWS IT, THIS ONCE.");
  else riverDisaster(lm,"TOOK ON WATER AND ROLLED");
}
function ferryRiver(lm,cost){
  if(G.cash<cost){
    show('<div class="gap2"></div><div class="c">THE FERRYMAN COUNTS YOUR MONEY FROM A DISTANCE AND SHAKES HIS HEAD.</div>'+
      '<div class="c dim">NO TOUCHY FOR FREE.</div>');
    anyKey(()=>{G.lmIdx--;landmarkArrive(lm);});
    return;
  }
  G.cash-=cost;
  const wait=ri(0,2);
  for(let i=0;i<wait;i++){advanceDate();consumeFood();}
  crossedOk(lm,"THE FERRY TAKES YOU ACROSS."+(wait?" YOU WAITED "+wait+" DAY"+(wait>1?"S":"")+" FOR THE PRIVILEGE.":"")+
    "<br>THE FERRYMAN SAYS NOTHING. IT IS INCLUDED IN THE PRICE.");
}
function waitRiver(lm){
  advanceDate();consumeFood();
  if(chance(0.5)&&lm.depth>2){ lm.depth=Math.max(2,lm.depth-ri(1,3)); }
  show('<div class="gap2"></div><div class="c">YOU WAIT A DAY. THE RIVER IS NOW '+lm.depth+' FEET DEEP.</div>'+
    '<div class="c dim">THE RIVER DID NOT NOTICE YOU WAITING.</div>');
  anyKey(()=>{G.lmIdx--;landmarkArrive(lm);});
}

/* ============ HUNTING ============ */
const ANIMALS=[
  {n:"SQUIRREL",lbs:2, sp:190, w:10,h:6,  p:0.30},
  {n:"RABBIT",  lbs:3, sp:160, w:12,h:7,  p:0.30},
  {n:"DEER",    lbs:35,sp:110, w:26,h:16, p:0.22},
  {n:"ELK",     lbs:70,sp:90,  w:32,h:20, p:0.12},
  {n:"BUFFALO", lbs:350,sp:55, w:46,h:26, p:0.06}
];
function startHunt(backFn){
  if(G.bullets<=0){
    show('<div class="gap2"></div><div class="c">YOU HAVE NO BULLETS.</div>'+
      '<div class="c dim">THE ANIMALS SOMEHOW KNOW THIS. THEY ARE EVERYWHERE TODAY.</div>');
    anyKey(backFn); return;
  }
  stopAnim();
  show('<div class="med w c" style="margin-top:6px">HUNTING</div>'+
    '<div class="c dim">CLICK OR TAP TO SHOOT. EACH SHOT IS ONE BULLET. 30 SECONDS.</div>');
  const cv=document.createElement("canvas");
  cv.width=640;cv.height=340;cv.style.width="min(640px,96%)";cv.style.cursor="none";
  SCR.appendChild(cv);
  const hud=document.createElement("div");
  hud.className="c";
  SCR.appendChild(hud);
  const cx=cv.getContext("2d");
  let mx=320,my=170,tLeft=30,meat=0,shots=0,hits=0,ended=false;
  let beasts=[];
  const t0=performance.now();
  let lastSpawn=0;
  function spawn(now){
    const r=rnd(); let acc=0, a=ANIMALS[0];
    for(const an of ANIMALS){acc+=an.p;if(r<=acc){a=an;break;}}
    const dir=chance(0.5)?1:-1;
    beasts.push({a,x:dir>0?-50:cv.width+50,y:40+rnd()*240,dir,
      sp:a.sp*(0.8+rnd()*0.5)});
  }
  function pos(e){
    const r=cv.getBoundingClientRect();
    const sx=cv.width/r.width, sy=cv.height/r.height;
    const px=(e.touches?e.touches[0].clientX:e.clientX)-r.left;
    const py=(e.touches?e.touches[0].clientY:e.clientY)-r.top;
    return {x:px*sx,y:py*sy};
  }
  cv.addEventListener("mousemove",e=>{const p=pos(e);mx=p.x;my=p.y;});
  cv.addEventListener("touchmove",e=>{e.preventDefault();const p=pos(e);mx=p.x;my=p.y;},{passive:false});
  function shoot(e){
    if(ended)return;
    const p=pos(e);mx=p.x;my=p.y;
    if(G.bullets<=0)return;
    G.bullets--;shots++;
    for(let i=beasts.length-1;i>=0;i--){
      const b=beasts[i];
      if(Math.abs(p.x-b.x)<b.a.w && Math.abs(p.y-b.y)<b.a.h+5){
        meat+=b.a.lbs;hits++;beasts.splice(i,1);break;
      }
    }
  }
  cv.addEventListener("mousedown",shoot);
  cv.addEventListener("touchstart",e=>{e.preventDefault();shoot(e);},{passive:false});
  let prev=performance.now();
  function frame(now){
    if(ended)return;
    const dt=(now-prev)/1000;prev=now;
    tLeft=30-(now-t0)/1000;
    if(tLeft<=0||G.bullets<=0&&beasts.length===0){end();return;}
    if(now-lastSpawn> (600+rnd()*900)){spawn(now);lastSpawn=now;}
    for(let i=beasts.length-1;i>=0;i--){
      const b=beasts[i];b.x+=b.dir*b.sp*dt;
      if(b.x<-80||b.x>cv.width+80)beasts.splice(i,1);
    }
    cx.fillStyle="#000";cx.fillRect(0,0,cv.width,cv.height);
    cx.fillStyle="#00FFC6";
    for(let x=0;x<cv.width;x+=16)cx.fillRect(x,320,9,2);
    for(const b of beasts){
      cx.fillRect(b.x-b.a.w/2,b.y-b.a.h/2,b.a.w,b.a.h);
      cx.fillRect(b.x+(b.dir>0?b.a.w/2:-b.a.w/2-6),b.y-b.a.h/2-4,6,6);
      const lp=((now>>7)%2)?2:-2;
      cx.fillRect(b.x-b.a.w/4+lp,b.y+b.a.h/2,3,6);
      cx.fillRect(b.x+b.a.w/4-lp,b.y+b.a.h/2,3,6);
    }
    // crosshair (white)
    cx.strokeStyle="#FFFFFF";cx.lineWidth=1.5;
    cx.beginPath();cx.arc(mx,my,10,0,7);cx.stroke();
    cx.beginPath();
    cx.moveTo(mx-16,my);cx.lineTo(mx-4,my);cx.moveTo(mx+4,my);cx.lineTo(mx+16,my);
    cx.moveTo(mx,my-16);cx.lineTo(mx,my-4);cx.moveTo(mx,my+4);cx.lineTo(mx,my+16);
    cx.stroke();
    hud.innerHTML="TIME: <span class='w'>"+Math.ceil(tLeft)+"</span>&nbsp;&nbsp;BULLETS: <span class='w'>"+G.bullets+
      "</span>&nbsp;&nbsp;MEAT SHOT: <span class='w'>"+meat+" LBS</span>";
    anim=requestAnimationFrame(frame);
  }
  function end(){
    ended=true;stopAnim();
    advanceDate();consumeFood();
    const carried=Math.min(100,meat);
    G.food+=carried;
    show('<div class="gap2"></div><div class="c med w">THE HUNT IS OVER</div><hr class="rule">'+
      '<div class="c">SHOTS FIRED: '+shots+' &nbsp; HITS: '+hits+'</div>'+
      '<div class="gap"></div>'+
      '<div class="c">YOU SHOT <span class="w">'+meat+' POUNDS</span> OF MEAT.</div>'+
      '<div class="c">YOU CARRY <span class="w">'+carried+' POUNDS</span> BACK TO THE WAGON.</div>'+
      (meat>100?'<div class="c dim">THE REST STAYS WHERE IT FELL. THIS IS THE LAW. IT PREDATES YOU.</div>':'')+
      '<hr class="rule">');
    anyKey(backFn);
  }
  anim=requestAnimationFrame(frame);
}

/* ============ DEATH ============ */
function deathScreen(deaths,after){
  SND.duck();
  const d=deaths[0];
  show('<div class="gap2"></div>'+
    '<div class="c med deathscreen">'+esc(d.p.name)+' HAS DIED OF '+esc(d.cause)+'.</div>'+
    '<div class="gap"></div><div class="c deathscreen dim">THE TRAIL CONTINUES. IT ALWAYS DOES.</div>'+
    '<div class="gap"></div>');
  menu([
    {k:"1",t:"WRITE A TOMBSTONE",fn:()=>{
      show('<div class="gap2"></div><div class="c med deathscreen">HERE LIES '+esc(d.p.name)+'</div>'+
        '<div class="gap"></div>');
      askText("WHAT SHOULD THE TOMBSTONE SAY?",txt=>{
        show('<div class="gap2"></div><div class="c deathscreen med">HERE LIES '+esc(d.p.name)+'</div>'+
          '<div class="c deathscreen">"'+esc(txt||"...")+'"</div>'+
          '<div class="gap"></div><div class="c dim">YOUR WORDS ARE CARVED INTO WOOD.<br>NO ONE WILL PASS THIS WAY. THE GAME IS TELLING YOU THIS DIRECTLY.</div>');
        anyKey(()=>{SND.unduck();nextDeath(deaths,after);});
      },40);
    }},
    {k:"2",t:"KEEP MOVING",fn:()=>{SND.unduck();nextDeath(deaths,after);}}
  ]);
}
function nextDeath(deaths,after){
  deaths.shift();
  if(deaths.length) deathScreen(deaths,after);
  else after();
}
function gameOverScreen(last){
  SND.duck();
  const cause=last?last.cause:"THE TRAIL";
  show('<div class="gap2"></div>'+
    '<div class="c big deathscreen">EVERYONE HAS DIED.</div>'+
    '<div class="gap"></div><div class="c deathscreen">THE LAST OF YOUR PARTY WAS TAKEN BY '+esc(cause)+'.</div>'+
    '<div class="gap"></div><div class="c deathscreen dim">'+G.miles+' MILES DOWN. '+(G.route-G.miles)+' MILES SHORT OF DAVENPORT.<br>DAVENPORT REMAINS WORLD FAMOUS WITHOUT YOU.</div>'+
    '<div class="gap"></div>');
  askText("WRITE AN EPITAPH FOR THE WAGON:",txt=>{
    show('<div class="gap2"></div><div class="c deathscreen med">"'+esc(txt||"THEY SET OUT.")+'"</div>'+
      '<div class="gap"></div><div class="c deathscreen dim">CARVED WHERE THE TRAIL CAN READ IT.</div>'+
      '<div class="gap"></div><div class="c dim">TRAIL SEED: '+seedStr()+'</div>');
    anyKey(()=>{SND.unduck();titleScreen();},"PRESS ANY KEY TO TRY THE TRAIL AGAIN");
  },48);
}

/* ============ ARRIVAL ============ */
function calcScore(){
  const hw=G.health>75?500:G.health>50?400:G.health>25?300:200;
  const people=aliveCount()*hw;
  const supplies=G.oxen*20 + Math.round(G.food/25) + G.clothing*2 + Math.round(G.bullets/20) +
    (G.parts.wheel+G.parts.axle+G.parts.tongue)*2;
  const cash=Math.round(G.cash/5);
  return {people,supplies,cash,total:(people+supplies+cash)*G.mult};
}
function arrivalScreen(){
  stopAnim();
  G.done=true;
  show('<div class="gap2"></div>'+
    '<div class="c">THE WAGON CRESTS A FINAL HILL.</div>'+
    '<div class="c">BELOW: THE RIVER. THE CITY. THE FAME, VISIBLE FROM HERE.</div>');
  anyKey(()=>{
    const sc=calcScore();
    show('<div class="gap"></div>'+
      '<div class="c big o">YOU HAVE ARRIVED AT<br>THE WORLD FAMOUS<br>DAVENPORT, IA.</div>'+
      '<div class="gap"></div>'+
      '<div class="c dim">'+MONTHS[G.month]+' '+G.day+' — '+G.miles+' MILES — '+aliveCount()+' OF 5 SURVIVED</div>'+
      '<hr class="rule"><pre>'+
      'SURVIVORS ('+aliveCount()+' x '+(sc.people/Math.max(1,aliveCount()))+')........ '+String(sc.people).padStart(6," ")+"\n"+
      'SUPPLIES.................. '+String(sc.supplies).padStart(6," ")+"\n"+
      'CASH...................... '+String(sc.cash).padStart(6," ")+"\n"+
      'OCCUPATION MULTIPLIER..... x'+G.mult+"\n"+
      '-----------------------------------\n'+
      'FINAL SCORE............... '+String(sc.total).padStart(6," ")+'</pre><hr class="rule">');
    anyKey(()=>creditsScreen(sc));
  });
}
function creditsScreen(sc){
  show('<div class="gap2"></div><div class="c med w">THE STOOPID TRAIL</div>'+
    '<div class="gap"></div><div class="c">'+
    'PRODUCED BY @STOOPIDSHOW &amp; THE INTERNET<br>'+
    'QUESTIONABLE INPUT FROM THE VOID<br>'+
    'WHATEVER DEVICE WAS CHARGED<br>'+
    'THE ALGORITHM (BARELY)<br>'+
    'HATERS (FUEL) / SUPPORTERS (EVERYTHING)</div>'+
    '<div class="gap2"></div><div class="c dim">TRAIL SEED: '+seedStr()+'</div>'+
    '<div class="gap"></div>');
  askText("ENTER YOUR NAME FOR THE TOP TEN:",name=>{
    TOPTEN.push({n:(name||"UNNAMED WAGON").toUpperCase().slice(0,26),s:sc.total});
    TOPTEN.sort((a,b)=>b.s-a.s);
    TOPTEN=TOPTEN.slice(0,10);
    finalScreen();
  },26);
}
function finalScreen(){
  let rows=TOPTEN.map((e,i)=>('  '+(i+1)).slice(-2)+'. '+(e.n+"                          ").slice(0,26)+String(e.s).padStart(6," ")).join("\n");
  show('<div class="gap"></div><div class="c med w">TOP TEN</div><hr class="rule"><pre>'+esc(rows)+'</pre>'+
    '<hr class="rule"><div class="c dim">SCORES ARE NOT SAVED. NOTHING IS.</div>'+
    '<div class="gap2"></div>');
  menu([{k:"1",t:"RETURN TO TITLE",fn:titleScreen}]);
  const sig=document.createElement("div");
  sig.className="c dim"; sig.style.marginTop="3em"; sig.style.fontSize=".85em";
  sig.textContent="SIGNAL RECEIVED.";
  SCR.appendChild(sig);
}

/* ============ BOOT ============ */
titleScreen();




</script>
